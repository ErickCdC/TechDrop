<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0f3460;
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card {
    width: 900px; text-align: center; padding: 60px;
  }
  .tag {
    background: #e94560; color: #ffffff;
    display: inline-block; padding: 8px 24px;
    border-radius: 50px; font-size: 18px;
    font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 40px;
  }
  h1 {
    font-size: 72px; font-weight: 900;
    color: #ffffff; line-height: 1.1;
    margin-bottom: 30px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  h1 span { color: #e94560; }
  p.sub {
    font-size: 28px; color: #ffffff;
    opacity: 0.85; margin-bottom: 60px; line-height: 1.5;
  }
  .btn {
    background: #e94560; color: #ffffff;
    padding: 22px 60px; border-radius: 50px;
    font-size: 26px; font-weight: 700;
    display: inline-block; margin-bottom: 50px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .rodape {
    font-size: 18px; color: #ffffff; opacity: 0.5;
  }
  .deco {
    position: absolute; width: 300px; height: 300px;
    background: #e94560; border-radius: 50%;
    opacity: 0.07; filter: blur(60px);
  }
  .deco-1 { top: -80px; left: -80px; }
  .deco-2 { bottom: -80px; right: -80px; }
</style>
</head>
<body>
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="card">
    <div class="tag">Saúde em Dia</div>
    <h1>Recupere Sua Energia e Libido Naturalmente</h1>
    <p class="sub">Reequilíbrio hormonal masculino sem remédios, com hábitos simples e comprovados</p>
    <div class="btn">Quero Minha Energia</div>
    <p class="rodape">Acesso imediato · Curso + Ebook incluso</p>
  </div>
</body>
</html>
